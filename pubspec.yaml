name: mini_katalog_app
description: Flutter eğitim müfredatına uygun Mini Katalog Uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/p1.png
    - assets/images/p2.png
    - assets/images/p3.png
    - assets/images/p4.png
    - assets/images/p5.png
    - assets/images/p6.png
    - assets/images/banner.png
